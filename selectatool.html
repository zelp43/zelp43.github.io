    <title>Crate Management Tool - Selecta Hub</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #141414;
            --accent: #ff3e3e;
            --text: #ffffff;
            --muted: #a0a0a0;
            --border: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Card Layout */
        .tool-page {
            padding: 80px 0;
            display: flex;
            justify-content: center;
        }

        .tool-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        .tool-tag {
            display: inline-block;
            background: rgba(255, 62, 62, 0.1);
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 700;
